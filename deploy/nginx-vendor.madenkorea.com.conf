# nginx vhost — vendor portal at vendor.madenkorea.com (reverse proxy -> Next.js on :3001)
# Install:
#   sudo cp deploy/nginx-vendor.madenkorea.com.conf /etc/nginx/sites-available/vendor.madenkorea.com
#   sudo ln -sf /etc/nginx/sites-available/vendor.madenkorea.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d vendor.madenkorea.com    # adds the 443 server block + HTTP->HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name vendor.madenkorea.com;

    # Upload ceiling for product / media uploads (presigned go direct to S3, but
    # keep headroom for any proxied multipart).
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
